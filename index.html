<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيقي</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #34A853;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            margin-top: 15px;
        }

        .btn img {
            width: 24px;
        }

        .btn:hover {
            background: #2c8c46;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>تطبيق نبرا</h2>

    <img src="app-image.png" alt="صورة التطبيق">

    <p>
        تطبيق مخصص لطلاب البكالوريا الأدبي في سوريا، يحتوي على أسئلة وأجوبة بطريقة سهلة وممتعة.
    </p>

    <a href="https://play.google.com/store/apps/details?id=com.nubra.nubra123" class="btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
        تثبيت الآن
    </a>
</div>

</body>

</html>
